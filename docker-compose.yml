version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    container_name: circuit-db
    environment:
      POSTGRES_DB: circuitdb
      POSTGRES_USER: circuit
      POSTGRES_PASSWORD: circuit123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U circuit"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: